services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      # waha:
      #   condition: service_started
      evolution-api:
        condition: service_healthy
      litellm:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestor_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # waha:
  #   image: devlikeapro/waha:latest-2026.5.1
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - WAHA_API_KEY=${WAHA_API_KEY}
  #     - WEBHOOK_URL=${WEBHOOK_URL}
  #     - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
  #     - WEBHOOK_HMAC_SECRET=${WEBHOOK_HMAC_SECRET}
  #     - WHATSAPP_SWAGGER_ENABLED=true

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${EVOLUTION_DATABASE_CONNECTION_URI}
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=false
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - LOG_LEVEL=ERROR,WARN,INFO
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_URL}
    ports:
      - "3000:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/environ && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.30.11
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  litellm:
    image: ghcr.io/berriai/litellm:v1.86.2
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      - LITELLM_MASTER_KEY=${LLM_API_KEY}
      - DATABASE_URL=${LITELLM_DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    # image: node:20-alpine
    build: 
      context: ./frontend
      dockerfile: Dockerfile.frontend
    working_dir: /app
    ports:
      - "8080:3000"
    volumes:
      # - frontend_node_modules:/app/node_modules
      # - ./frontend/node_modules:/app/node_modules
      # - frontend_next:/app/.next
      # - ./frontend/.next:/app/.next
      # - ./frontend:/app
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - WATCHPACK_POLLING=true
    # command: sh -c "npm install && npm run dev"
    command: npm run dev
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
  # frontend_node_modules:
  # frontend_next:
