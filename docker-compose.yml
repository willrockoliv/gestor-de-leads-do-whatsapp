services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/leads
      - DEBUG=true
      - WHATSAPP_API_URL=http://waha:3000
      - WHATSAPP_API_PORT=3000
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - WHATSAPP_WEBHOOK_URL=${WHATSAPP_WEBHOOK_URL:-http://backend:8000/webhooks/whatsapp}
      - WHATSAPP_WEBHOOK_HMAC_KEY=${WHATSAPP_WEBHOOK_HMAC_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      waha:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  waha:
    image: devlikeapro/waha:latest-2026.5.1
    ports:
      - "3001:3000"
    environment:
      - WAHA_API_KEY=${WHATSAPP_API_KEY:-}
      - WHATSAPP_HOOK_URL=${WHATSAPP_WEBHOOK_URL:-http://backend:8000/webhooks/whatsapp}
      - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
      - WHATSAPP_HOOK_HMAC_KEY=${WHATSAPP_WEBHOOK_HMAC_KEY:-}
      - WHATSAPP_SWAGGER_ENABLED=true

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
      # - frontend_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  pgdata:
  # frontend_node_modules:
  # frontend_next:
