services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/leads
      - DEBUG=true
      - WHATSAPP_API_URL=http://waha:3000
      - WHATSAPP_API_PORT=3000
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - WHATSAPP_WEBHOOK_URL=${WHATSAPP_WEBHOOK_URL:-http://backend:8000/webhooks/whatsapp}
      - WHATSAPP_WEBHOOK_HMAC_KEY=${WHATSAPP_WEBHOOK_HMAC_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      # waha:
      #   condition: service_started
      evolution-api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      default:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # waha:
  #   image: devlikeapro/waha:latest-2026.5.1
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - WAHA_API_KEY=${WHATSAPP_API_KEY:-}
  #     - WHATSAPP_HOOK_URL=${WHATSAPP_WEBHOOK_URL:-http://backend:8000/webhooks/whatsapp}
  #     - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
  #     - WHATSAPP_HOOK_HMAC_KEY=${WHATSAPP_WEBHOOK_HMAC_KEY:-}
  #     - WHATSAPP_SWAGGER_ENABLED=true

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/evolution_db?schema=evolution_api
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=false
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-sk-evolution-test-key}
      - LOG_LEVEL=ERROR,WARN,INFO
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WHATSAPP_WEBHOOK_URL:-http://backend:8000/webhooks/evolution}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

