services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_HMAC_SECRET=${WEBHOOK_HMAC_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      # waha:
      #   condition: service_started
      evolution-api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # waha:
  #   image: devlikeapro/waha:latest-2026.5.1
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - WAHA_API_KEY=${WAHA_API_KEY}
  #     - WEBHOOK_URL=${WEBHOOK_URL}
  #     - WHATSAPP_HOOK_EVENTS=message,message.any,session.status
  #     - WEBHOOK_HMAC_SECRET=${WEBHOOK_HMAC_SECRET}
  #     - WHATSAPP_SWAGGER_ENABLED=true

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${EVOLUTION_DATABASE_CONNECTION_URI}
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=false
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - LOG_LEVEL=ERROR,WARN,INFO
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_URL}
    ports:
      - "3000:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/environ && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

