name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pip-audit==2.9.0

      - name: pip-audit (fail on vulnerabilities)
        run: python -m pip_audit -r requirements.txt

      - name: Run security-focused backend tests
        run: |
          python -m pytest tests/test_auth.py tests/test_webhook_integration.py tests/test_redaction.py -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high
